name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe it clearly below.

  - type: input
    id: app_version
    attributes:
      label: App Version
      description: The version you are currently using. Found in Settings → About. e.g. `1.4.2 (312)`
      placeholder: "1.4.2 (312)"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: The device this feature is primarily for. e.g. `iPhone 15 Pro`, `iPad Air 5`, `Apple TV 4K (3rd gen)`
      placeholder: "iPhone 15 Pro"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Why do you need it?
      placeholder: "I'm frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like and how it should work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative solutions you've considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, or any other context.
    validations:
      required: false
